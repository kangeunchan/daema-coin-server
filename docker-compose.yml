services:
  postgres:
    image: postgres:16-alpine
    container_name: daema-coin-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: daema_coin
      POSTGRES_USER: daema
      POSTGRES_PASSWORD: daema
    ports:
      - "5432:5432"
    volumes:
      - daema_coin_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U daema -d daema_coin"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: daema-coin-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - daema_coin_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  seaweedfs:
    image: chrislusf/seaweedfs:latest
    container_name: daema-coin-seaweedfs
    restart: unless-stopped
    command:
      - server
      - -dir=/data
      - -master.port=9333
      - -volume.port=8081
      - -volume.publicUrl=localhost:8081
    ports:
      - "9333:9333"
      - "8081:8081"
    volumes:
      - daema_coin_seaweedfs_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://$(hostname -i):9333/cluster/status >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  daema_coin_postgres_data:
  daema_coin_redis_data:
  daema_coin_seaweedfs_data:
