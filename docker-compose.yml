services:
  postgres:
    image: postgres:16-alpine
    container_name: daema-coin-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: daema_coin
      POSTGRES_USER: daema
      POSTGRES_PASSWORD: daema
    ports:
      - "5432:5432"
    volumes:
      - daema_coin_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U daema -d daema_coin"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: daema-coin-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - daema_coin_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  daema_coin_postgres_data:
  daema_coin_redis_data:
